<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Spotlight Quiz</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: black;
    font-family: Arial;
    color: white;
}

/* UI */
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    padding: 15px;
    border-radius: 12px;
}

input {
    font-size: 18px;
    padding: 10px;
    width: 220px;
}

button {
    font-size: 18px;
    padding: 10px 18px;
    margin-top: 5px;
}

/* Bild */
.image-container {
    position: relative;
    width: 100vw;
    height: 100vh;
}

.image-container img {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 95vw;
    height: 95vh;
    object-fit: contain;
}

/* Spotlight */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;

    mask-image: radial-gradient(circle 120px at center, transparent 0%, black 100%);
    -webkit-mask-image: radial-gradient(circle 120px at center, transparent 0%, black 100%);
}

/* 🌈 FUNKEN (GRÖSSER + STÄRKER) */
.spark {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    pointer-events: none;
    animation: sparkle 1.6s ease-out forwards;
    box-shadow: 0 0 12px currentColor, 0 0 25px currentColor;
    z-index: 9999;
}

@keyframes sparkle {
    0% {
        transform: scale(1) translate(0,0);
        opacity: 1;
    }
    100% {
        transform: scale(0) translate(var(--x), var(--y));
        opacity: 0;
    }
}
</style>

</head>
<body>

<div id="ui">
    <h3 id="question"></h3>

    <input type="text" id="answer" placeholder="Antwort...">
    <button onclick="checkAnswer()">OK</button>

    <button id="nextBtn" onclick="nextQuestion()" style="display:none;">
        Weiter ➜
    </button>

    <div id="result"></div>
    <div id="score"></div>
</div>

<div class="image-container">
    <img id="quizImage">
    <div class="overlay" id="overlay"></div>
</div>

<script>
const quiz = [
    { img: "Zauberer.JPG", question: "Was seht ihr?", answer: "zauberer" },
    { img: "bild2.jpg", question: "Was seht ihr?", answer: "frosch" },
    { img: "bild3.jpg", question: "Was seht ihr?", answer: "schwein" }
];

let current = 0;
let points = 0;
let solved = false;
let revealTimeout;

const img = document.getElementById("quizImage");
const question = document.getElementById("question");
const result = document.getElementById("result");
const score = document.getElementById("score");
const nextBtn = document.getElementById("nextBtn");
const overlay = document.getElementById("overlay");
const container = document.querySelector(".image-container");

/* 🔦 Spotlight */
container.addEventListener("mousemove", (e) => {
    if (solved) return;

    const rect = container.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const radius = rect.width * 0.08;

    overlay.style.maskImage =
        `radial-gradient(circle ${radius}px at ${x}px ${y}px, transparent 0%, black 100%)`;

    overlay.style.webkitMaskImage =
        `radial-gradient(circle ${radius}px at ${x}px ${y}px, transparent 0%, black 100%)`;
});

/* 📱 Touch */
container.addEventListener("touchmove", (e) => {
    if (solved) return;

    const rect = container.getBoundingClientRect();
    const t = e.touches[0];

    const radius = rect.width * 0.08;

    overlay.style.maskImage =
        `radial-gradient(circle ${radius}px at ${t.clientX - rect.left}px ${t.clientY - rect.top}px, transparent 0%, black 100%)`;
});

/* 🌈 GROßES FEUERWERK */
function createSparkles(x, y) {
    const colors = ["#ff0000","#00ff00","#00ccff","#ff00ff","#ffff00","#ff8800"];

    for (let i = 0; i < 140; i++) {
        const spark = document.createElement("div");
        spark.className = "spark";

        const color = colors[Math.floor(Math.random() * colors.length)];
        spark.style.background = color;

        const dx = (Math.random() - 0.5) * 600 + "px";
        const dy = (Math.random() - 0.5) * 600 + "px";

        spark.style.left = x + "px";
        spark.style.top = y + "px";
        spark.style.setProperty("--x", dx);
        spark.style.setProperty("--y", dy);

        document.body.appendChild(spark);

        setTimeout(() => spark.remove(), 1600);
    }
}

/* ✨ MAGIE + DELAY */
function magicEffect() {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;

    createSparkles(cx, cy);
    setTimeout(() => createSparkles(cx, cy), 200);
    setTimeout(() => createSparkles(cx, cy), 400);
}

/* 📥 Frage */
function loadQuestion() {
    solved = false;
    nextBtn.style.display = "none";

    img.src = quiz[current].img;
    question.innerText = quiz[current].question;
    result.innerText = "";
    score.innerText = "Punkte: " + points;

    overlay.style.opacity = "1";
}

/* ✅ Antwort */
function checkAnswer() {
    const user = document.getElementById("answer").value.toLowerCase().trim();

    if (user === quiz[current].answer) {
        points++;
        solved = true;

        result.innerText = "✨ Richtig!";
        score.innerText = "Punkte: " + points;

        magicEffect();

        /* ⏱ 1 SEKUNDE WARTEN DANN AUFDECKEN */
        revealTimeout = setTimeout(() => {
            overlay.style.transition = "opacity 0.6s";
            overlay.style.opacity = "0";
        }, 1000);

        nextBtn.style.display = "inline-block";
    } else {
        result.innerText = "❌ Falsch!";
    }
}

/* ➜ weiter */
function nextQuestion() {
    current++;

    if (current < quiz.length) {
        document.getElementById("answer").value = "";
        loadQuestion();
    } else {
        endGame();
    }
}

/* 🎉 Ende */
function endGame() {
    document.body.innerHTML = `
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;">
            <h1>🎉 Fertig!</h1>
            <h2>Punkte: ${points} / ${quiz.length}</h2>
            <button onclick="location.reload()">Nochmal</button>
        </div>
    `;
}

/* Start */
loadQuestion();
</script>

</body>
</html>
