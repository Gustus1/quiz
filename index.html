<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Spotlight Quiz</title>

<!-- wichtig für iPad Vollbild / App-Feeling -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: black;
    font-family: Arial;
    color: white;
}

/* UI größer für Touch */
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    padding: 15px;
    border-radius: 12px;
}

/* große Eingabe */
input {
    font-size: 18px;
    padding: 10px;
    width: 220px;
}

/* große Buttons (Fingerfreundlich) */
button {
    font-size: 18px;
    padding: 10px 18px;
    margin-top: 5px;
}

/* Bild */
.image-container {
    position: relative;
    width: 100vw;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

.image-container img {
    max-width: 95vw;
    max-height: 95vh;
    object-fit: contain;
}

/* Spotlight */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;

    mask-image: radial-gradient(circle 120px at center, transparent 0%, black 100%);
    -webkit-mask-image: radial-gradient(circle 120px at center, transparent 0%, black 100%);
}
</style>

</head>
<body>

<div id="ui">
    <h3 id="question"></h3>

    <input type="text" id="answer" placeholder="Antwort...">
    <button onclick="checkAnswer()">OK</button>

    <button id="nextBtn" onclick="nextQuestion()" style="display:none;">
        Weiter ➜
    </button>

    <div id="result"></div>
    <div id="score"></div>
</div>

<div class="image-container">
    <img id="quizImage">
    <div class="overlay" id="overlay"></div>
</div>

<script>
const quiz = [
    { img: "bild1.jpg", question: "Was ist auf dem Bild?", answer: "auto" },
    { img: "bild2.jpg", question: "Welches Tier ist das?", answer: "katze" },
    { img: "bild3.jpg", question: "Welches Obst ist das?", answer: "apfel" }
];

let current = 0;
let points = 0;
let solved = false;

const overlay = document.getElementById("overlay");
const container = document.querySelector(".image-container");

const img = document.getElementById("quizImage");
const question = document.getElementById("question");
const result = document.getElementById("result");
const score = document.getElementById("score");
const nextBtn = document.getElementById("nextBtn");

// 🔥 gemeinsame Funktion
function updateSpotlight(x, y) {
    const rect = container.getBoundingClientRect();
    const radius = rect.width * 0.12;

    overlay.style.maskImage =
        `radial-gradient(circle ${radius}px at ${x}px ${y}px, transparent 0%, black 100%)`;

    overlay.style.webkitMaskImage =
        `radial-gradient(circle ${radius}px at ${x}px ${y}px, transparent 0%, black 100%)`;
}

// 🖱️ Maus (PC)
container.addEventListener("mousemove", (e) => {
    if (solved) return;

    const rect = container.getBoundingClientRect();
    updateSpotlight(e.clientX - rect.left, e.clientY - rect.top);
});

// 👆 Touch (iPad / Handy)
container.addEventListener("touchmove", (e) => {
    if (solved) return;

    const rect = container.getBoundingClientRect();
    const touch = e.touches[0];

    updateSpotlight(
        touch.clientX - rect.left,
        touch.clientY - rect.top
    );
});

// 📌 Frage laden
function loadQuestion() {
    solved = false;
    nextBtn.style.display = "none";

    img.src = quiz[current].img;
    question.innerText = quiz[current].question;
    result.innerText = "";
    score.innerText = "Punkte: " + points;

    overlay.style.opacity = "1";
}

// ✅ Antwort prüfen
function checkAnswer() {
    const user = document.getElementById("answer").value.toLowerCase().trim();

    if (user === quiz[current].answer) {
        points++;
        result.innerText = "✅ Richtig!";
        score.innerText = "Punkte: " + points;

        solved = true;

        overlay.style.opacity = "0"; // Bild sichtbar
        nextBtn.style.display = "inline-block";
    } else {
        result.innerText = "❌ Falsch!";
    }
}

// 👉 nächste Frage
function nextQuestion() {
    current++;

    if (current < quiz.length) {
        document.getElementById("answer").value = "";
        overlay.style.opacity = "1";
        loadQuestion();
    } else {
        endGame();
    }
}

// 🏁 Ende
function endGame() {
    document.body.innerHTML = `
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;">
            <h1>🎉 Fertig!</h1>
            <h2>Punkte: ${points} / ${quiz.length}</h2>
            <button onclick="location.reload()">Nochmal</button>
        </div>
    `;
}

// 🚀 Start
loadQuestion();
</script>

</body>
</html>
